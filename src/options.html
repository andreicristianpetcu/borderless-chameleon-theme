<!DOCTYPE html>

<html>
  <head>
    <meta charset="utf-8">
  </head>

<body>

  <h2>Site-based filters</h2>
  <form>
      <label>Remove toolbar bottom border</label>
      <input type="checkbox" id="config_HTML_border" >
  </form>

  <form>
      <label>Top gradient</label>
      <input type="checkbox" id="config_HTML_gradient" >
  </form>

  <form>
      <label>Selected tab line same as text</label>
      <input type="checkbox" id="config_HTML_tabline" >
  </form>

  <form>
      <label>Background color adapted from sites</label>
      <input type="checkbox" id="config_HTML_accent" >
  </form>

  <form>
    <label>Make tabs, toolbar, and background all the same</label>
      <input type="checkbox" id="config_HTML_toolbar" >
  </form>

  <form>
    <label>Only new tab color (use fixed color instead of reusing previous tab color)</label>
    <input type="checkbox" id="config_HTML_no_reuse" >
    <label for="config_HTML_new_tab_color" style="margin-left:8px">Color:</label>
    <input type="color" id="config_HTML_new_tab_color" value="#ffffff" title="Color for new tabs">
  </form>

  <form>
    <label>Tell websites I prefer</label>
    <select id="config_HTML_content_color_scheme">
      <option value="auto">Auto (follow browser theme)</option>
      <option value="light">Light theme</option>
      <option value="dark">Dark theme</option>
    </select>
  </form>

  <script src="options.js"></script>
</body>

</html>
